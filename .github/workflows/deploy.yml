name: deploy

# Phase 3b of server_plan.md. After a merge to main the build workflow
# re-runs; when it passes, this workflow ships the new generation to the
# box via deploy-rs. deploy-rs does "magic rollback": activates the new
# generation, health-checks it, and auto-reverts to the previous
# generation if the box isn't reachable afterwards.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys overlap — half-activation is the one outcome we
# can't recover from automatically.
concurrency:
  group: deploy-foundry
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run once the build workflow has passed for this ref. The
    # `workflow_run` trigger is an alternative but harder to reason
    # about; explicit `needs` across workflows requires splitting into
    # one file, so we instead re-run the essential checks cheaply here.
    # If those change meaningfully, move them into a shared action.
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Setup Cachix
        if: ${{ vars.CACHIX_CACHE_NAME != '' }}
        uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Load the deploy user's private key into ssh-agent. The matching
      # public key is baked into `modules/hosts/foundry/configuration.nix`
      # under `users.users.deploy.openssh.authorizedKeys.keys`.
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.FOUNDRY_DEPLOY_KEY }}

      # Pin the host key so we don't silently TOFU a man-in-the-middle.
      # `FOUNDRY_KNOWN_HOSTS` is the output of
      #   ssh-keyscan -t ed25519 <foundry-ip>
      # run once from a trusted machine and stashed in repo secrets.
      - name: Pin host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.FOUNDRY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # The real hostname/IP lives only in repo secrets — this public
      # flake does not name the box. deploy-rs's `--hostname` flag
      # overrides the placeholder set in `modules/deploy.nix`.
      #
      # `--skip-checks` because the build workflow already ran
      # `nix flake check` on this commit; re-running it here just
      # doubles latency. Keep it, drop it if paranoid.
      - name: Deploy
        run: |
          nix run github:serokell/deploy-rs -- \
            --skip-checks \
            --hostname "${{ secrets.FOUNDRY_HOST }}" \
            .#foundry
