name: build

# Phase 3a of server_plan.md: safety-net CI that evaluates the flake and
# builds the foundry NixOS closure before anything reaches `main`. The
# deploy workflow (Phase 3b) runs only after this passes on main.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action posts a summary / SARIF on PRs.
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan PR diffs.
          fetch-depth: 0

      # Belt-and-braces over the local git-hooks.nix pre-commit gate: catches
      # the case where someone pushed with `--no-verify`. `nix flake check`
      # below also re-runs the declarative hooks, so there are two independent
      # gitleaks invocations by design.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true

      # Optional: push builds to a Cachix cache to speed up deploys. Set the
      # `CACHIX_CACHE_NAME` repository variable and `CACHIX_AUTH_TOKEN` secret
      # to enable. Without them the workflow still runs, just without caching.
      - name: Setup Cachix
        if: ${{ vars.CACHIX_CACHE_NAME != '' }}
        uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Re-runs the pre-commit hooks declared in modules/pre-commit.nix
      # (gitleaks + alejandra) plus any other `checks.<system>` outputs —
      # the deploy-rs checks for `deploy.nodes.foundry` land here too.
      - name: nix flake check
        run: nix flake check --print-build-logs

      # Full system closure. Catches most eval errors and any build-time
      # failures in the foundry module graph.
      - name: Build foundry toplevel
        run: |
          nix build --print-build-logs \
            .#nixosConfigurations.foundry.config.system.build.toplevel

      # Cheap extra sanity gate: the VM build exercises a stricter subset
      # of module evaluation (e.g. filesystem + bootloader assertions
      # that `toplevel` skips) and catches a class of activation-time
      # errors before they hit the real box.
      - name: Build foundry VM
        run: |
          nix build --print-build-logs \
            .#nixosConfigurations.foundry.config.system.build.vm
