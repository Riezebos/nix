name: ci

# Phase 3a + 3b of server_plan.md. One workflow, two jobs: build always
# runs; deploy runs only on push to main *and* only if build succeeded
# (job-level `needs`). Earlier attempt used two independent workflows
# which both triggered off the same push event and ran in parallel —
# concurrency groups don't gate one workflow on another.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Setup Cachix
        if: ${{ vars.CACHIX_CACHE_NAME != '' }}
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # `nix flake check` is unusable here: on x86_64-linux it insists on
      # evaluating `homeConfigurations.simon-darwin` / `simon-m4`, whose
      # nixpkgs-devenv IFD patch derivation is pinned to aarch64-darwin
      # and cannot be built on a Linux runner. Enumerate the x86_64-linux
      # checks explicitly instead — this covers the same gates
      # (pre-commit hooks, deploy-rs schema + activator) without the
      # cross-system eval trap.
      - name: Build checks
        run: |
          nix build --print-build-logs \
            .#checks.x86_64-linux.pre-commit \
            .#checks.x86_64-linux.deploy-activate \
            .#checks.x86_64-linux.deploy-schema

      # Full system closure. Catches most eval errors and any build-time
      # failures in the foundry module graph. This is what deploy-rs
      # will activate; if it builds, activation is very likely to work.
      #
      # We intentionally do NOT also build `…system.build.vm` here, even
      # though the plan suggests it as an optional extra gate. The VM
      # variant evaluates `virtualisation.vmVariant` which assert-fails
      # on our `boot.initrd.network.ssh.hostKeys` referencing a string
      # path (`/etc/secrets/initrd/ssh_host_ed25519_key`) — VMs require
      # literal Nix paths so the secret can be embedded at build time,
      # but on the real box that file is provisioned at install via
      # nixos-anywhere --extra-files and doesn't exist in the flake.
      # Working around this would require a stack of vmVariant overrides
      # (disable initrd-SSH, replace LUKS/mdraid with a plain disk…)
      # that drift from the real config and stop catching useful bugs.
      # `build.toplevel` + deploy-rs magic-rollback is the real gate.
      - name: Build foundry toplevel
        run: |
          nix build --print-build-logs \
            .#nixosConfigurations.foundry.config.system.build.toplevel

  deploy:
    needs: build
    # Only auto-deploy from `main`, and only when the event is a push
    # (or explicit workflow_dispatch from main). Skips for PRs, feature
    # branches, and PRs from forks.
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    # Never let two deploys overlap — half-activation is the one
    # outcome magic-rollback can't recover from.
    concurrency:
      group: deploy-foundry
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Setup Cachix
        if: ${{ vars.CACHIX_CACHE_NAME != '' }}
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Load the deploy user's private key into ssh-agent. Matching
      # pubkey lives in modules/hosts/foundry/configuration.nix under
      # `users.users.deploy.openssh.authorizedKeys.keys`.
      - name: Setup SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.FOUNDRY_DEPLOY_KEY }}

      # Pin the host key so the runner can't silently TOFU an MITM.
      # `FOUNDRY_KNOWN_HOSTS` = output of
      #   ssh-keyscan -t ed25519 <foundry-ip>
      # run once from a trusted machine.
      - name: Pin host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.FOUNDRY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # `--hostname` overrides the placeholder in modules/deploy.nix so
      # the real IP never lands in this public repo. `--skip-checks`
      # because the build job above already built the deploy-rs
      # checks; re-running them here just doubles latency.
      # Uses `apps.deploy-rs` from this flake (flake-locked input).
      - name: Deploy
        run: |
          nix run .#deploy-rs -- \
            --skip-checks \
            --hostname "${{ secrets.FOUNDRY_HOST }}" \
            .#foundry
