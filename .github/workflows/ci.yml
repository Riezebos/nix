name: ci

# One workflow, two jobs: build always runs; deploy runs only on push to main
# and only if build succeeded (job-level `needs`). Earlier attempt used two
# independent workflows which both triggered off the same push event and ran in
# parallel; concurrency groups do not gate one workflow on another.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Setup Cachix
        if: ${{ vars.CACHIX_CACHE_NAME != '' }}
        uses: cachix/cachix-action@f495f3ffa2f3810a92e5cc0abc2c5d6a2a07ec82 # v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # `nix flake check` is unusable here: on x86_64-linux it insists on
      # evaluating `homeConfigurations.simon-darwin` / `simon-m4`, whose
      # nixpkgs-devenv IFD patch derivation is pinned to aarch64-darwin
      # and cannot be built on a Linux runner.
      #
      # FoundryVTT's installer zip is also not available to GitHub Actions
      # because it is a personal-license file. Do not build deploy-rs checks
      # here: both the activator and schema checks realize the deploy profile,
      # which builds the system closure and would require the zip. The deploy
      # job uses deploy-rs remoteBuild so the real closure builds on foundry,
      # where the zip is seeded into the Nix store.
      - name: Build pre-commit checks
        run: |
          nix build --print-build-logs \
            .#checks.x86_64-linux.pre-commit

      - name: Evaluate deploy config
        run: |
          nix eval --json .#deploy >/dev/null

      # Instantiate the system closure. This catches eval errors in the
      # foundry module graph without trying to build the proprietary Foundry
      # package on the GitHub runner.
      #
      # We intentionally do NOT also build `…system.build.vm` here. The VM
      # variant evaluates `virtualisation.vmVariant` which assert-fails
      # on our `boot.initrd.network.ssh.hostKeys` referencing a string
      # path (`/etc/secrets/initrd/ssh_host_ed25519_key`) — VMs require
      # literal Nix paths so the secret can be embedded at build time,
      # but on the real box that file is provisioned at install via
      # nixos-anywhere --extra-files and doesn't exist in the flake.
      # Working around this would require a stack of vmVariant overrides
      # (disable initrd-SSH, replace LUKS/mdraid with a plain disk…)
      # that drift from the real config and stop catching useful bugs.
      # Instantiation here + remoteBuild + deploy-rs magic-rollback is the
      # real gate.
      - name: Instantiate foundry toplevel
        run: |
          nix eval --raw \
            .#nixosConfigurations.foundry.config.system.build.toplevel.drvPath

  deploy:
    needs: build
    # Only auto-deploy from `main`, and only when the event is a push
    # (or explicit workflow_dispatch from main). Skips for PRs, feature
    # branches, and PRs from forks.
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    # Never let two deploys overlap — half-activation is the one
    # outcome magic-rollback can't recover from.
    concurrency:
      group: deploy-foundry
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Setup Cachix
        if: ${{ vars.CACHIX_CACHE_NAME != '' }}
        uses: cachix/cachix-action@f495f3ffa2f3810a92e5cc0abc2c5d6a2a07ec82 # v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Load the deploy user's private key into ssh-agent. Matching
      # pubkey lives in modules/hosts/foundry/configuration.nix under
      # `users.users.deploy.openssh.authorizedKeys.keys`.
      - name: Setup SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.FOUNDRY_DEPLOY_KEY }}

      # Pin the host key so the runner can't silently TOFU an MITM.
      # `FOUNDRY_KNOWN_HOSTS` = output of
      #   ssh-keyscan -t ed25519 -p 62222 <foundry-ip>
      # run once from a trusted machine.
      #
      # The ssh_config block applies keepalives to EVERY ssh process spawned
      # on this runner, including the connections nix pools for the
      # ssh-ng:// store. deploy-rs passes ServerAlive* via NIX_SSHOPTS, but
      # nix opens its first remote-store connection early and lets it sit
      # idle for the whole local evaluation (~20 min); the runner's NAT
      # dropped that idle mapping twice on 2026-07-21 and the later build
      # request went down the dead socket — a read that never returns.
      # Keepalives every 15s both hold the NAT mapping open and turn a dead
      # peer into a hard error within ~60s instead of a silent hang.
      - name: Pin host key and harden ssh
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.FOUNDRY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host *
            ServerAliveInterval 15
            ServerAliveCountMax 4
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config

      # `--hostname` overrides the placeholder in modules/deploy.nix so
      # the real IP never lands in this public repo. `--skip-checks`
      # because the build job above already built the deploy-rs
      # checks; re-running them here just doubles latency.
      # Uses `apps.deploy-rs` from this flake (flake-locked input).
      - name: Deploy
        # A wedged ssh/nix-daemon session or a unit that never finishes
        # activating would otherwise hang here until GitHub's 6h default.
        #
        # Two bounded attempts: deploy-rs is safe to re-run (magic-rollback
        # cleans up a failed activation, and store-level build/copy progress
        # persists on foundry), so a transient network failure costs one
        # retry instead of the whole deploy. Budgets are calibrated to
        # observed runs, not hopes: the "Building profile" phase alone
        # (copying the drv closure to foundry, round-trip heavy) takes
        # 20-25 min on a cold runner, and a full deploy has taken 45+.
        #
        # Asymmetric budgets. The first attempt gets 60 min — enough for a
        # full cold deploy — because the retry only helps if attempt 1 was
        # allowed to make real progress first. The second gets 25: whatever
        # it copied and built is already in foundry's store, so a warm
        # attempt has far less left to do, and capping it keeps a
        # non-resumable hang from costing two full budgets.
        timeout-minutes: 90
        run: |
          attempt=0
          for budget in 60m 25m; do
            attempt=$((attempt + 1))
            rc=0
            timeout "${budget}" nix run .#deploy-rs -- \
              --skip-checks \
              --hostname "${{ secrets.FOUNDRY_HOST }}" \
              .#foundry || rc=$?
            if [ "$rc" = 0 ]; then
              exit 0
            fi
            echo "::warning::deploy attempt ${attempt} (${budget} budget) failed (exit ${rc}; 124 means per-attempt timeout)"
            if [ "$attempt" = 1 ]; then sleep 30; fi
          done
          exit 1
