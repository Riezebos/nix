name: update-flake-lock

# Once a week the bot bumps flake.lock and opens a PR; the build workflow then
# runs against the PR head so we know before merging whether the new inputs
# actually build. Merging the PR triggers the deploy workflow, which ships the
# bumped inputs to the box. Server autoUpgrade pulls from `github:Riezebos/nix`
# nightly so the server converges shortly after.

on:
  workflow_dispatch:
  schedule:
    # 04:00 UTC Mondays. Lands before the server's 04:30 autoUpgrade,
    # but autoUpgrade still reads from `main` so the bump only goes
    # live once the PR is merged (by a human).
    - cron: "0 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          pr-title: "chore: weekly flake.lock update"
          pr-labels: |
            dependencies
            automated
          commit-msg: "chore: update flake.lock"
